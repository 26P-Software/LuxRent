<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradients</title>
    <style>

        :root {
            --border-stone-700: #44403c;
        }
        .gradient {
            background: linear-gradient(to right, green, yellow, red);
            height: 70px;
            width: 100%;
            border-radius: 8px;
        }
        .gradient1 {
            background: radial-gradient(at 0% 50%, green 30px, yellow 60%);
            height: 70px;
            width: 100%;
            border-radius: 8px;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: blue;
            animation: changeColor 3s infinite;
            margin: 5px;
        }

        @keyframes changeColor {
            0% {
                background-color: blue;
            }
            50% {
                background-color: red;
            }
            100% {
                background-color: green;
            }
        }

     .slider-viewport {
        border: 1px solid var(--border-stone-700);
        width: 100%;
        height: 350px;
        overflow: hidden;
        position: relative;
        background-color: #12100e;
     } 
     
     .slider-film-strip {
        display: flex;
        width: 400%;
        height: 100%;
        animation: slideSequence 16s infinite ease-in-out;
     }
     .slide {
        width: 25%;
        height: 100%;
        position: relative;
     }
     .slide img {
        width: 100%;
        height: auto;
        object-fit: cover;
        mix-blend-mode: luminosity;
        opacity: 0.85;
        transition: all 0.5s ease;
     }

             @keyframes slideSequence {
            /* Slide 1: Visible */
            0%   { transform: translateX(0%); }
            20%  { transform: translateX(0%); }
            
            /* Transition 1 → 2 */
            25%  { transform: translateX(-25%); }
            /* Slide 2: Visible */
            45%  { transform: translateX(-25%); }
            
            /* Transition 2 → 3 */
            50%  { transform: translateX(-50%); }
            /* Slide 3: Visible */
            70%  { transform: translateX(-50%); }
            
            /* Transition 3 → 4 */
            75%  { transform: translateX(-75%); }
            /* Slide 4: Visible */
            95%  { transform: translateX(-75%); }
            
            /* Transition 4 → Back to 1 */
            100% { transform: translateX(0%); }
        }
    </style>
</head>
<body>
    <div class="gradient">

    </div>
    <div class="gradient1">

    </div>
    <div class="box">

    </div>
    <div class="slider-viewport">
                
            <!-- Linear Multi-Width Track -->
            <div class="slider-film-strip">
                
                <!-- Slide 1 -->
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" alt="Telemetry Map Matrix">
                    <div class="slide-caption">01 // Compute Mesh</div>
                </div>

                <!-- Slide 2 -->
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="Hardware Node Matrix">
                    <div class="slide-caption">02 // Core Hardware</div>
                </div>

                <!-- Slide 3 -->
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=800&q=80" alt="Encrypted Network Channels">
                    <div class="slide-caption">03 // Cyber Architecture</div>
                </div>

                <!-- Slide 4 -->
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=800&q=80" alt="Server Datacenter Arrays">
                    <div class="slide-caption">04 // Storage Arrays</div>
                </div>

            </div> <!-- End Filmstrip -->
        </div> <!-- End Viewport -->

</body>
</html>
