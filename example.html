<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #fff;
        }
        /*-- Absolute units --*/
        .unit-mm {
            font-size: 5mm;
        }
        .unit-cm {
            font-size: 1cm;
        }
        .unit-inch {
            font-size: 0.5in;
        }
        .unit-quarter {
            font-size: 40Q;
        }
        .pix-unit {
            font-size: 20px;
        }

                .unit-em {
            font-size: 2em;
        }
        .unit-rem {
            font-size: 1.5rem;
        }
        .unit-vw {
            font-size: 5vw;
        }
        .unit-vh {
            font-size: 5vh;
        }
        .unit-percent {
            font-size: 150%;
        }
         .text {
            text-shadow: 5px 5px 1px grey, 1px 1px 2px blue;
         }
         .container {
            box-shadow: 5px 10px 18px #888;
            width: 200px;
            height: 100px;
            border-radius: 8px;
            background-color: yellow;
         } 
         .heading {
            color: red;
            text-align: center;
            font-family: Arial;
         }
    </style>
</head>
<body >
    <header>
        <nav class="nav">
            <ul>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="contact" class="contact">
            <div class="form">
                <form action=""></form>
            </div>
        </section>
        <div class="container">
            <h1 class="heading">I have content here</h1>
        </div>
        
        <h1 class="unit-mm"> Font size 5mm </h1>
        <h1 class="unit-cm"> Font size 1cm </h1>
        <h1 class="unit-inch"> Font size 0.5inch </h1>
        <h1 class="unit-quarter"> Font size 40Q </h1>
        <h1 class="pix-unit"> Font size 20px </h1><br><br><hr>
        <h1 class="unit-em">Font size 2em </h1> 
        <h1 class="unit-rem">Font size 1.5rem </h1>
        <h1 class="unit-vw">Font size 5vw </h1>
        <h1 class="unit-vh">Font size 5vh </h1>
        <h1 class="unit-percent">Font size 150% </h1>
        <div style="border: 2px solid rgb(18, 18, 18); padding: 6px;">
            <p style="text-align: left; text-decoration: underline red solid 5px">Text Alignment (Left)</p>
            <p style="text-align: center; text-transform: uppercase;">text alignment (Center )</p>
            <p style="text-align: right;">Text Alignment (Right)</p>
        </div>
        <div class="container">
            <h2 class="text">Shadows</h2>

        </div>

    </main>
</body>
</html>
